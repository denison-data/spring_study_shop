<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- top.html의 head 부분 include -->
<head th:replace="layout/header :: header"></head>
<div th:replace="layout/left :: left"></div>
<div id="con">
    <div id="Club">
        <div style="padding-bottom:25px;padding-top:20px;">
            <img th:src="@{/img/common/tit_10.gif}">
        </div>
        <div style="display:block;overflow:hidden;padding-top:10px;">
            <div style="text-align:right;padding-bottom:5px;">
                &nbsp;
<!--                <form name="FRM" method="get">-->
<!--                    <select name="title" class="select" v-model="searchParams.title">-->
<!--                        <option value="subject"  :selected="(searchParams.title === 'subject') || (searchParams.title === null)">제목</option>-->
<!--                        <option value="contents"  :selected="searchParams.title === 'contents'">내용</option>-->
<!--                        &lt;!&ndash;<option>작성자</option>&ndash;&gt;-->
<!--                    </select>-->
<!--                    <input  size="18" class="input_notice" name="search" type="text" v-model="searchParams.search">-->
<!--                    <input  type="image" th:src="@{/img/button/check_bt.gif}" alt="검색" />-->
<!--                </form>-->
            </div>
            <div style="padding-bottom:10px;">
                <table cellspacing="0"cellpadding="0" border="0" style="width:100%;">
                    <tr>
                        <td class="tr_01" align="center" width="70px">번호</td>
                        <td class="tr_01" align="left">제목</td>
                        <td class="tr_01" align="center" width="120px">등록일</td>
                        <td class="tr_01" align="center" width="80px">조회수</td>
                    </tr>
                    <tr v-if="boardList.length === 0">
                        <td colspan="4" height="1px"  class="td_002" align="center">조회된 데이터가 없습니다</td>
                    </tr>
                    <!-- 데이터 있을 때 -->
                    <template v-else>
                        <template v-for="(item, index) in boardList">
                            <tr :key="item.no">
                                <td class="td_01" align="center" ><span class="te_en">{{ totalElements - ((currentPage - 1) * pageSize + index) }}</td>
                                <td class="td_01" align="left"><a :href="`/board/cartoon_v?no=${item.id}`">{{ item.subject }}</a></td>
                                <td class="td_01" align="center"><span class="te_en te_le sz_11">{{ item.formattedDateTime }}</span></td>
                                <td class="td_01" align="center"><span class="te_en te_le sz_11">{{ item.hit }}</span></td>
                            </tr>
                        </template>
                    </template>
                </table>
            </div>
            <div style="padding-top:10px; padding-bottom:20px;text-align:center;">
                <!-- 페이징 처리 -->
                <div class="page" v-if="totalPages > 0">
                    <p>
                        <!-- 이전 페이지 -->
                        <a href="javascript:void(0)"
                           :class="{'off': currentPage === 1}"
                           @click="changePage(currentPage - 1)"
                           v-if="currentPage > 1">
                            &lt;
                        </a>

                        <!-- 페이지 번호들 -->
                        <a href="javascript:void(0)"
                           v-for="pageNum in getPageNumbers()"
                           :key="pageNum"
                           :class="{'on': pageNum === currentPage}"
                           @click="changePage(pageNum)">
                            {{ pageNum }}
                        </a>

                        <!-- 다음 페이지 -->
                        <a href="javascript:void(0)"
                           :class="{'off': currentPage === totalPages}"
                           @click="changePage(currentPage + 1)"
                           v-if="currentPage < totalPages">
                            &gt;
                        </a>
                    </p>
                </div>
            </div>

        </div>
    </div>
</div>
<script>
new Vue({
    el: "#Club",
    data: {
        boardList: [],
        currentPage: 1,
        totalPages: 0,
        pageSize: 10,
        totalElements: 0,
        setPage: 5,
        searchParams: {
        },
    },
    created() {
        this.loadData();
    },
    methods: {
        async loadData(page = 1) {
             try {
                const response = await axios.get('/api/board/cartoon', {
                    params: {
                        page: page,
                        size: this.pageSize
                    }
                });
                 console.log(response.data.content);
                this.boardList = response.data.content || [];
                this.currentPage = response.data.currentPage || 1;
                this.totalPages = response.data.totalPages || 0;
                this.totalElements = response.data.totalElements || 0;

             } catch (error) {
                console.error('Data 紐⑸줉 濡쒕뱶 �ㅽ뙣:', error);
                this.boardList = [];
                alert('데이터를 불러오는데 실패했습니다.');
             }
        },
         // 페이지 변경
        changePage(page) {
            if (page < 1 || page > this.totalPages || page === this.currentPage) {
                return;
            }
            this.loadData(page);
            // 페이지 상단으로 스크롤
            window.scrollTo({ top: 0, behavior: 'smooth' });
        },
        getPageNumbers() {
            const pageGroupSize = 10; // PHP의 bbs_page_scale
            let pageStart = Math.floor(this.currentPage / pageGroupSize) * pageGroupSize + 1;

            if ((this.currentPage % pageGroupSize) === 0) {
                pageStart -= pageGroupSize;
            }

            const pageEnd = Math.min(pageStart + pageGroupSize - 1, this.totalPages);
            const pages = [];

            for (let i = pageStart; i <= pageEnd; i++) {
                pages.push(i);
            }

            return pages;
        },
    }
});
</script>
<div th:replace="layout/bottom :: bottom"></div>
</body>
</html>
